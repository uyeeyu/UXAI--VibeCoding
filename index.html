<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <div class="score-board">
                <div class="score-card player-x">
                    <span class="label">Player (X)</span>
                    <span id="score-x" class="value">0</span>
                </div>
                <div class="score-card player-o">
                    <span class="label">AI (O)</span>
                    <span id="score-o" class="value">0</span>
                </div>
            </div>
        </header>

        <main>
            <div id="game-board" class="game-board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </main>

        <footer>
            <div class="game-controls">
                <div class="difficulty-select">
                    <button class="btn difficulty active" data-difficulty="hard">Impossible AI</button>
                    <button class="btn difficulty" data-difficulty="easy">Easy AI</button>
                </div>
                <button id="reset-btn" class="btn primary">Restart Game</button>
            </div>
            <p id="status-text" class="status-info">Your turn!</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
